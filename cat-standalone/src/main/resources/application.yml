server:
  port: 8080

spring:
  application:
    name: cat-standalone
  data:
    redis:
      port: 6380

# 数据存储配置
cat:
  data-dir: ./data
  auth:
    enabled: true
    default-user: admin
    default-password: admin123
    token-header: X-Cat-Token

# 日志配置
logging:
  level:
    com.cat: DEBUG
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized